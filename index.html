<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meme Playground</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- HOME -->
    <div class="page active" id="homePage">
        <h1 class="title">🎭 Meme Playground</h1>

        <div class="playground">
            
            <div class="fun-card c1" onclick="navigate('memePage')">😂 Meme</div>
            <div class="fun-card c2" onclick="navigate('splitPage')">😎 Split</div>
            <div class="fun-card c3" onclick="navigate('chatPage')">💬 Chat</div>
            <div class="fun-card c4" onclick="navigate('galleryPage')">🖼️ Gallery</div>
        </div>
    </div>

    <!-- MEME -->
    <div class="page" id="memePage">
        <button onclick="goHome()">← Back</button>

        <input type="file" id="imageInput">
        <input type="text" id="topText" placeholder="Top Text">
        <input type="text" id="bottomText" placeholder="Bottom Text">

        <button onclick="generateMeme()">Generate</button>
        <button onclick="downloadMeme()">Download</button>

        <canvas id="canvas"></canvas>
    </div>

    <!-- SPLIT -->
    <div class="page" id="splitPage">
        <button onclick="goHome()">← Back</button>

        <input type="text" id="leftText" placeholder="Expectation">
        <input type="text" id="rightText" placeholder="Reality">

        <button onclick="generateSplit()">Generate</button>

        <canvas id="splitCanvas"></canvas>
    </div>

    <!-- CHAT -->
    <div class="page" id="chatPage">
        <button onclick="goHome()">← Back</button>

        <div class="chat-box" id="chatBox"></div>

        <input type="text" id="chatInput" placeholder="Message">
        <select id="sender">
            <option value="me">Me</option>
            <option value="friend">Friend</option>
        </select>

        <button onclick="addMessage()">Send</button>
        <button onclick="downloadChat()">Download</button>
    </div>

    <!-- GALLERY -->
    <div class="page" id="galleryPage">
        <button onclick="goHome()">← Back</button>
        <div id="gallery"></div>
    </div>

</div>

<script src="script.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
