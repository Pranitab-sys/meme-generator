<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meme Studio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">
        🔥 Meme Studio
    </div>

    <!-- HOME -->
    <div id="homePage" class="page active">
        <div class="menu">
            <div class="menu-card" onclick="showPage('memePage')">😂 Meme Generator</div>
            <div class="menu-card" onclick="showPage('splitPage')">😎 Split Meme</div>
            <div class="menu-card" onclick="showPage('chatPage')">💬 Chat Meme</div>
            <div class="menu-card" onclick="showPage('galleryPage')">🖼️ My Memes</div>
        </div>
    </div>

    <!-- MEME -->
    <div id="memePage" class="page">
        <button class="back" onclick="goHome()">←</button>

        <input type="file" id="imageInput">
        <input type="text" id="topText" placeholder="Top Text">
        <input type="text" id="bottomText" placeholder="Bottom Text">

        <input type="color" id="textColor">
        <input type="range" id="fontSize" min="20" max="60">

        <button onclick="generateMeme()">Generate</button>
        <button onclick="downloadMeme()">Download</button>

        <canvas id="memeCanvas"></canvas>
    </div>

    <!-- SPLIT -->
    <div id="splitPage" class="page">
        <button class="back" onclick="goHome()">←</button>

        <input type="text" id="leftText" placeholder="Expectation">
        <input type="text" id="rightText" placeholder="Reality">

        <input type="color" id="leftColor">
        <input type="color" id="rightColor">

        <button onclick="generateSplitMeme()">Generate</button>
        <button onclick="downloadMeme()">Download</button>
    </div>

    <!-- CHAT -->
    <div id="chatPage" class="page">
        <button class="back" onclick="goHome()">←</button>

        <div class="chat-box" id="chatBox"></div>

        <input type="text" id="chatInput" placeholder="Message">
        <select id="sender">
            <option value="me">Me</option>
            <option value="friend">Friend</option>
        </select>

        <button onclick="addMessage()">Send</button>
        <button onclick="downloadChat()">Download</button>
    </div>

    <!-- GALLERY -->
    <div id="galleryPage" class="page">
        <button class="back" onclick="goHome()">←</button>
        <div id="gallery"></div>
    </div>

</div>

<script src="script.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
