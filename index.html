<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meme Studio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HOME -->
<div id="home" class="page active">
    <h1>🔥 Meme Studio</h1>

    <div class="grid">
        <div class="box" onclick="openPage('memePage')">Meme Generator</div>
        <div class="box" onclick="openPage('splitPage')">Split Meme</div>
        <div class="box" onclick="openPage('chatPage')">Chat Meme</div>
        <div class="box" onclick="openPage('templatePage')">Templates</div>
        <div class="box" onclick="openPage('savedPage')">Saved Memes</div>
    </div>
</div>

<!-- MEME PAGE -->
<h2>🖼️ Meme Generator</h2>

<input type="file" id="imageInput">

<input type="text" id="topText" placeholder="Top Text">
<input type="text" id="bottomText" placeholder="Bottom Text">

<label>Font Size</label>
<input type="range" id="fontSize" min="20" max="60" value="30">

<label>Font Color</label>
<input type="color" id="fontColor" value="#ffffff">

<label>Font Style</label>
<select id="fontFamily">
    <option value="Arial">Arial</option>
    <option value="Impact">Impact</option>
    <option value="Georgia">Georgia</option>
    <option value="Courier New">Courier</option>
</select>

<button onclick="generateMeme()">Generate</button>
<button onclick="downloadMeme()">Download</button>

<canvas id="memeCanvas"></canvas>

<!-- SPLIT PAGE -->
<div id="splitPage" class="page">
    <button onclick="goHome()">⬅ Back</button>
    <h2>😎 Split Meme</h2>

    <input type="text" id="leftText" placeholder="Left Text">
    <input type="text" id="rightText" placeholder="Right Text">

    <button onclick="generateSplitMeme()">Generate</button>

    <canvas id="splitCanvas"></canvas>
</div>

<!-- CHAT PAGE -->
<div id="chatPage" class="page">
    <button onclick="goHome()">⬅ Back</button>
    <h2>💬 Chat Meme</h2>

    <div id="chatBox" class="chat-box"></div>

    <input type="text" id="chatInput" placeholder="Message">
    <select id="sender">
        <option value="me">Me</option>
        <option value="friend">Friend</option>
    </select>

    <button onclick="addMessage()">Add</button>
</div>

<!-- TEMPLATE PAGE -->
<div id="templatePage" class="page">
    <button onclick="goHome()">⬅ Back</button>
    <h2>🎭 Choose Template</h2>

    <div class="template-grid">
        <img src="https://i.imgflip.com/1bij.jpg" onclick="selectTemplate(this.src)">
        <img src="https://i.imgflip.com/26am.jpg" onclick="selectTemplate(this.src)">
        <img src="https://i.imgflip.com/30b1gx.jpg" onclick="selectTemplate(this.src)">
    </div>
</div>

<!-- SAVED MEMES -->
<div id="savedPage" class="page">
    <button onclick="goHome()">⬅ Back</button>
    <h2>📁 Saved Memes</h2>

    <div id="savedMemes"></div>
</div>

<script src="script.js"></script>
</body>
</html>
